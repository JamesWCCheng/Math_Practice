<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Practice - 數學練習題庫</title>
    <!-- 引入 Font Awesome 為了美觀圖示 (非必要) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", "微軟正黑體", sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #333;
            background-color: #fce4ec; /* 淺紫/粉色背景，活潑一點 */
            background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        h2 {
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            color: #34495e;
            margin-top: 30px;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 100%;
        }
        .intro-text {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .link-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .link-list a {
            display: flex;
            align-items: center;
            text-decoration: none;
            background-color: #3498db;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .link-list a i {
            font-size: 1.5em;
            margin-right: 15px;
        }
        .link-list a:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }
        .link-list a.answer-btn {
            background-color: #e67e22;
        }
        .link-list a.answer-btn:hover {
            background-color: #d35400;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9em;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-graduation-cap"></i> 數學練習題庫</h1>
        <p class="intro-text">持續匯總整理的精選測驗卷，隨時打開練習、線上列印！</p>
        
        <h2>📚 一元一次方程式 (第一單元)</h2>
        <ul class="link-list">
            <li>
                <a href="equations_questions.html">
                    <i class="fas fa-pencil-alt"></i> 
                    一元一次方程式 精選 80 題 (列印作答卷)
                </a>
            </li>
            <li>
                <a href="equations_answers.html" class="answer-btn">
                    <i class="fas fa-lightbulb"></i> 
                    一元一次方程式 精選 80 題 (解答對照表)
                </a>
            </li>
        </ul>
        
        <div class="footer">
            <p>Hosted beautifully on GitHub Pages <i class="fab fa-github"></i></p>
        </div>
    </div>
</body>
</html>
