# 一元一次方程式 精選練習題 (題目卷)

這份練習題是從 80 頁 PDF 的題庫中，每頁挑選出一題最具鑑別度的題目彙整而成。這次為您加大了題目間的作答留白，方便直接列印計算，並且在每題旁邊明確標示出處（例如：H11a 第4題），方便您隨時回去核對題庫原始頁面。

---

### 【第一階段：基礎運算與移項】

**1.** $x + 5 = 3$ 　 *(出處：H11a, 第4題)*
<br><br>
**2.** $x - 5.6 = 4$ 　 *(出處：H11b, 第19題)*
<br><br>
**3.** $-3 = -6x$ 　 *(出處：H12a, 第8題)*
<br><br>
**4.** $-\frac{x}{4} = -8$ 　 *(出處：H12b, 第18題)*
<br><br>
**5.** $-\frac{3}{4}x = 2$ 　 *(出處：H13a, 第4題)*
<br><br>
**6.** $-3x + 2 = -7$ 　 *(出處：H13b, 第20題)*
<br><br>
**7.** $-\frac{2}{3}x + 2 = 4$ 　 *(出處：H14a, 第10題)*
<br><br>
**8.** $1 + \frac{3}{2}x = \frac{2}{3}$ 　 *(出處：H14b, 第19題)*
<br><br>
**9.** $-5x + 1 = 3x - 7$ 　 *(出處：H15a, 第4題)*
<br><br>
**10.** $-4x - 1 = -2x - 7$ 　 *(出處：H15b, 第9題)*
<br><br>
**11.** $3x + 8 = 5x - 2$ 　 *(出處：H16a, 第4題)*
<br><br>
**12.** $-2x - 8 = -7x - 2$ 　 *(出處：H16b, 第12題)*
<br><br>
**13.** $3x - 8 = -7x - 3$ 　 *(出處：H17a, 第4題)*
<br><br>
**14.** $9x - 43 = -30x - 4$ 　 *(出處：H17b, 第15題)*
<br><br>
**15.** $7x - 6 = -5x + 3$ 　 *(出處：H18a, 第6題)*
<br><br>
**16.** $8 - 9x = 7x - 4$ 　 *(出處：H18b, 第15題)*
<br><br>
**17.** $5x - 8 = x - 4$ 　 *(出處：H19a, 第7題)*
<br><br>
**18.** $-6 + 3x = 10 + 4x$ 　 *(出處：H19b, 第16題)*
<br><br>
**19.** $5 - 3x + 7x - 3 = 0$ 　 *(出處：H20a, 第6題)*
<br><br>
**20.** $2x - 7x - 7 = -6x + 9$ 　 *(出處：H20b, 第16題)*
<br><br>

---

### 【第二階段：基本分數與小數混合】

**21.** $-\frac{1}{2}x + 3 = -\frac{1}{3}x - 2$ 　 *(出處：H21a, 第4題)*
<br><br>
**22.** $\frac{x}{2} - \frac{1}{3} = \frac{1}{3}x - \frac{1}{3}$ 　 *(出處：H21b, 第12題)*
<br><br>
**23.** $-\frac{1}{2}x + \frac{1}{8} = -\frac{1}{3}x + \frac{1}{4}$ 　 *(出處：H22a, 第6題)*
<br><br>
**24.** $-\frac{1}{3}x + \frac{1}{2} = -\frac{1}{4}x - 1$ 　 *(出處：H22b, 第11題)*
<br><br>
**25.** $\frac{1}{3}x - 2 = -\frac{3}{5}x - 9$ 　 *(出處：H23a, 第4題)*
<br><br>
**26.** $\frac{1}{5}x + 6 = \frac{3}{4}x - 5$ 　 *(出處：H23b, 第10題)*
<br><br>
**27.** $2.5x - 1.4 = -1.5x + 0.6$ 　 *(出處：H24a, 第5題)*
<br><br>
**28.** $-\frac{1}{5}x + 6 = -\frac{3}{4}x - 5$ 　 *(出處：H24b, 第10題)*
<br><br>
**29.** $7 - 9x + 3 - x = -20x + 5$ 　 *(出處：H25a, 第5題)*
<br><br>
**30.** $\frac{2}{3}x - \frac{1}{4} = -\frac{1}{4}x - 3$ 　 *(出處：H25b, 第9題)*
<br><br>

---

### 【第三階段：括號與分配律】

**31.** $-4(3x+5) = 5(-2x-3)$ 　 *(出處：H26a, 第7題)*
<br><br>
**32.** $8 - 7(2x+1) = -6x - 7$ 　 *(出處：H26b, 第15題)*
<br><br>
**33.** $3x - 2(4x+5) = 3(-5x-10)$ 　 *(出處：H27a, 第6題)*
<br><br>
**34.** $8(x-1) + 17(x-2) = 4(4x-9)$ 　 *(出處：H27b, 第12題)*
<br><br>
**35.** $-(5x-8) = 3(x-2) + 14$ 　 *(出處：H28a, 第4題)*
<br><br>
**36.** $2x - (6-x) = \frac{3}{2}$ 　 *(出處：H28b, 第10題)*
<br><br>
**37.** $32x + 24 = 5(2x-4)$ 　 *(出處：H29a, 第7題)*
<br><br>
**38.** $9 - 12x + 1 = 12 - (3x + 2)$ 　 *(出處：H29b, 第12題)*
<br><br>
**39.** $-\frac{2}{3}x + \frac{1}{4} = \frac{1}{4}x + 3$ 　 *(出處：H30a, 第6題)*
<br><br>
**40.** $0.2(2.8x-3.5) = 0.7(4.8x-1.8)$ 　 *(出處：H30b, 第12題)*
<br><br>

---

### 【第四階段：進階分數方程式】

**41.** $\frac{5}{8}x - \frac{1}{6} = \frac{3}{4}x - \frac{1}{2}$ 　 *(出處：H31a, 第4題)*
<br><br>
**42.** $1 - \frac{x}{2} = \frac{1}{3} - \frac{2}{5}x$ 　 *(出處：H31b, 第12題)*
<br><br>
**43.** $\frac{1}{2}x - \frac{2}{3}x = 4$ 　 *(出處：H32a, 第4題)*
<br><br>
**44.** $\frac{2}{5} - \frac{7}{50}x = \frac{21}{100}x - 1$ 　 *(出處：H32b, 第12題)*
<br><br>
**45.** $-\frac{1}{3}x - \frac{1}{2} = -\frac{1}{5}x - 1$ 　 *(出處：H33a, 第4題)*
<br><br>
**46.** $\frac{2}{3}x - 2 = 2x - 6$ 　 *(出處：H33b, 第7題)*
<br><br>
**47.** $\frac{x+5}{3} = \frac{3x-6}{2}$ 　 *(出處：H34a, 第4題)*
<br><br>
**48.** $\frac{-x+5}{6} = \frac{1}{2}$ 　 *(出處：H34b, 第11題)*
<br><br>
**49.** $\frac{x+4}{3} = \frac{3x-9}{2}$ 　 *(出處：H35a, 第4題)*
<br><br>
**50.** $\frac{x}{5} + \frac{2}{25} = \frac{1}{25} - \frac{2x}{5}$ 　 *(出處：H35b, 第10題)*
<br><br>
**51.** $\frac{4x}{3} + \frac{x+1}{2} = \frac{7}{3}$ 　 *(出處：H36a, 第4題)*
<br><br>
**52.** $\frac{x}{2} + \frac{4x-10}{5} = \frac{7}{10}x$ 　 *(出處：H36b, 第11題)*
<br><br>
**53.** $\frac{1}{2} - \frac{x-5}{6} = \frac{2x-3}{4}$ 　 *(出處：H37a, 第4題)*
<br><br>
**54.** $\frac{x-2}{2} = \frac{x+5}{6} + \frac{1}{3}$ 　 *(出處：H37b, 第10題)*
<br><br>
**55.** $x - \frac{2x+3}{5} = 3$ 　 *(出處：H38a, 第4題)*
<br><br>
**56.** $\frac{x}{8} - \frac{2x-10}{5} = \frac{7}{20}x$ 　 *(出處：H38b, 第11題)*
<br><br>
**57.** $\frac{x+4}{3} = \frac{3x-5}{2} - \frac{1}{4}$ 　 *(出處：H39a, 第4題)*
<br><br>
**58.** $\frac{2x+1}{3} - \frac{x-1}{2} = \frac{5}{6}$ 　 *(出處：H39b, 第10題)*
<br><br>
**59.** $\frac{4x+12}{3} + x = \frac{5}{6}x$ 　 *(出處：H40a, 第4題)*
<br><br>
**60.** $\frac{3}{2} - \frac{x-5}{3} = \frac{3x-1}{2}$ 　 *(出處：H40b, 第11題)*
<br><br>

---

### 【第五階段：綜合高階挑戰題】

**61.** $\frac{3}{8}x - \frac{x-14}{12} = \frac{7}{8}x$ 　 *(出處：H41a, 第4題)*
<br><br>
**62.** $\frac{1}{3}x - 8 = \frac{3}{4}x + 2$ 　 *(出處：H41b, 第10題)*
<br><br>
**63.** $\frac{2x-1}{9} + \frac{x-1}{6} = \frac{3x+15}{12}$ 　 *(出處：H42a, 第4題)*
<br><br>
**64.** $\frac{2}{3}(\frac{1}{5}x - \frac{1}{2}) = \frac{1}{10}x - \frac{1}{5}$ 　 *(出處：H42b, 第11題)*
<br><br>
**65.** $-\frac{x}{2} - \frac{x-1}{3} = \frac{5}{6}$ 　 *(出處：H43a, 第4題)*
<br><br>
**66.** $\frac{2x-5}{3} - \frac{x+2}{4} = 2$ 　 *(出處：H43b, 第10題)*
<br><br>
**67.** $\frac{2}{3}(\frac{1}{2}x - 5) = \frac{x+1}{6} - 3$ 　 *(出處：H44a, 第4題)*
<br><br>
**68.** $0.02x + 1.3 = 0.16x - 2.9$ 　 *(出處：H44b, 第10題)*
<br><br>
**69.** $\frac{2x-1}{3} - \frac{6x-5}{2} = \frac{5}{6}$ 　 *(出處：H45a, 第4題)*
<br><br>
**70.** $\frac{x-2}{2} - \frac{x-5}{3} = \frac{x-6}{4}$ 　 *(出處：H45b, 第10題)*
<br><br>
**71.** $\frac{x}{5} - \frac{2}{25} = \frac{1}{25} - \frac{2x}{5}$ 　 *(出處：H46a, 第4題)*
<br><br>
**72.** $0.3(0.2x+1) = 0.4(0.5x-1)$ 　 *(出處：H46b, 第12題)*
<br><br>
**73.** $3y - \frac{5y-4}{6} = -8$  *(這題未知數為y)* 　 *(出處：H47a, 第4題)*
<br><br>
**74.** $\frac{3}{2}(x-5) + 0.5x = \frac{5x-3}{4}$ 　 *(出處：H47b, 第9題)*
<br><br>
**75.** $2x - \frac{11x+19}{4} = -\frac{19+2x}{9}$ 　 *(出處：H48a, 第3題)*
<br><br>
**76.** $\frac{1}{3}(x-5) = \frac{3}{2} - \frac{1}{2}(3x-1)$ 　 *(出處：H48b, 第7題)*
<br><br>
**77.** $\frac{2x-1}{3} - \frac{x-1}{2} + \frac{4x-7}{6} = 1$ 　 *(出處：H49a, 第4題)*
<br><br>
**78.** $3\{x - 3(2x-1)\} = 2(2x-5)$ 　 *(出處：H49b, 第7題)*
<br><br>
**79.** $\frac{1-2x}{7} + 2 = 1 - \frac{2x-6}{5} - 2x$ 　 *(出處：H50a, 第2題)*
<br><br>
**80.** $\frac{x-3}{4} - \frac{2x-5}{6} - \frac{1}{3} = \frac{3x-8}{5} - \frac{5x+6}{15}$ 　 *(出處：H50b, 第6題)*
